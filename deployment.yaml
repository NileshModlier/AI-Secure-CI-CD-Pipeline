
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-inference
  namespace: secure-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-inference
  template:
    metadata:
      labels:
        app: ai-inference
    spec:
      containers:
      - name: ai
        image: ghcr.io/your-org/ai-service:PLACEHOLDER
        ports:
        - containerPort: 8000

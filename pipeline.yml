
name: Secure AI CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  secure-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Dependency scan
      run: |
        python -m pip install pip-audit
        pip-audit app/requirements.txt

    - name: Build image
      run: docker build -t ai-service:${{ github.sha }} ./docker

    - name: Scan image
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        image-ref: ai-service:${{ github.sha }}
        severity: CRITICAL,HIGH
        exit-code: 1

    - name: Generate SBOM
      uses: anchore/sbom-action@v0.15.11
      with:
        image: ai-service:${{ github.sha }}
        format: spdx-json
        output-file: sbom.json

    - name: Install cosign
      uses: sigstore/cosign-installer@v3.5.0

    - name: Sign image
      env:
        COSIGN_EXPERIMENTAL: "true"
      run: cosign sign --yes ai-service:${{ github.sha }}

    - name: Prepare OPA input
      run: |
        cat <<EOF > opa-input.json
        {
          "image": {"signed": true},
          "vulnerabilities": {"critical": []},
          "build": {"source": "github-actions"}
        }
        EOF

    - name: Enforce OPA policy
      uses: open-policy-agent/setup-opa@v2
      with:
        version: latest

    - run: opa eval --fail-defined --input opa-input.json --data ci/policies/deployment.rego "data.cicd.deploy.allow"

    - name: Canary validation
      run: python ci/scripts/canary_check.py
